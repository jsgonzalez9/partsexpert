<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Parts Compatibility Engine</title>
<!-- Load Inter Font -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#f96706',
            background: '#09090b',
            foreground: '#fafafa',
            card: '#09090b',
            'card-foreground': '#fafafa',
            popover: '#09090b',
            'popover-foreground': '#fafafa',
            muted: '#27272a',
            'muted-foreground': '#a1a1aa',
            accent: '#27272a',

            border: '#27272a',
            input: '#27272a',
            ring: '#f96706'

          borderRadius: {
            'custom': '4px',

          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],

      }

<style data-purpose="custom-overrides">
    body {
      background-color: #09090b;
      color: #fafafa;
      -webkit-tap-highlight-color: transparent;
    }
    /* Industrial texture hint */
    .industrial-bg {
      background-image: radial-gradient(#27272a 0.5px, transparent 0.5px);
      background-size: 24px 24px;

</head>
<body class="font-sans antialiased min-h-screen pb-20 industrial-bg">
<!-- BEGIN: MainHeader -->
<header class="sticky top-0 z-50 w-full border-b border-border bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60 px-4 py-4" data-purpose="sticky-header">
<div class="flex items-center justify-between max-w-lg mx-auto">
<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-primary rounded-custom flex items-center justify-center">
<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-sm font-bold tracking-tighter uppercase">Comp Engine</span>
</div>

<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 6h16M4 12h16m-7 6h7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="max-w-lg mx-auto px-4 py-6 space-y-8" data-purpose="main-layout">
<!-- BEGIN: SearchSection -->
<section class="space-y-4" id="search-container">
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-muted-foreground" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" fill-rule="evenodd"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-16 py-4 bg-card border border-border rounded-custom text-foreground focus:ring-primary focus:border-primary text-sm shadow-sm" data-purpose="command-k-search" placeholder="Search parts, numbers, or specs..." type="text"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<kbd class="hidden sm:inline-flex h-6 select-none items-center gap-1 rounded border border-border bg-muted px-1.5 font-mono text-[10px] font-medium text-muted-foreground opacity-100">
<span class="text-xs">⌘</span>K
          </kbd>
</div>
</div>
</section>
<!-- END: SearchSection -->
<!-- BEGIN: QuickFilters -->

</svg>

<svg class="h-6 w-6 text-muted-foreground group-hover:text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<circle cx="12" cy="12" r="3"></circle>
</svg>
</div>
<span class="text-xs font-medium">Motors</span>
</button>
</div>

<div class="flex items-center justify-between p-4 bg-card border border-border rounded-custom group cursor-pointer hover:bg-muted/50 transition-all">

<!-- BEGIN: CompatibilityStats -->

<!-- Decorative background icon -->

</main>

<script data-purpose="app-logic">
    // Mock functionality for search focus
    const searchInput = document.querySelector('input[data-purpose="command-k-search"]');
    
    // Desktop shortcut simulation
    window.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
      }
    });

    // Mobile tactile feedback simulation
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('touchstart', () => {
        btn.style.opacity = '0.7';
      });
      btn.addEventListener('touchend', () => {
        btn.style.opacity = '1';
      });
    });
  </script>
</body></html>
